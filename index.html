<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AutoKart - Your Trusted Auto Parts Marketplace</title>
    <meta name="description" content="AutoKart is your trusted online auto parts marketplace. Shop engine parts, brakes, batteries, tyres, accessories & more with fast delivery.">
    <meta name="keywords" content="auto parts, car parts, engine oil, brakes, batteries, tyres, AutoKart, automotive, Yenepoya project">
    <meta name="author" content="Mohammed Saleeth">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2874f0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

    <!-- Razorpay Checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div id="app">
        <!-- ===== HEADER ===== -->
        <header id="app-header">
            <div class="header-top-wrapper">
                <div class="header-top">
                    <div class="header-left" onclick="navigate('home')">
                        <img src="logo.png" alt="AutoKart Logo" class="app-logo"
                             onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2236%22 height=%2236%22 viewBox=%220 0 36 36%22><rect width=%2236%22 height=%2236%22 rx=%228%22 fill=%22%232874f0%22/><text x=%2250%%22 y=%2250%%22 font-family=%22Outfit,sans-serif%22 font-size=%2214%22 font-weight=%22800%22 fill=%22white%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22>AK</text></svg>'">
                        <div class="brand-text">
                            <span class="brand-title">AutoKart</span>
                            <span class="brand-subtitle">Your Trusted Parts Marketplace</span>
                        </div>
                    </div>
                    
                    <!-- Desktop Navigation Links -->
                    <div class="desktop-nav-links">
                        <span onclick="navigate('home')"><i class="ph ph-house"></i> Home</span>
                        <span onclick="navigate('categories')"><i class="ph ph-squares-four"></i> Categories</span>
                        <span onclick="navigate('wishlist')"><i class="ph ph-heart"></i> Wishlist</span>
                        <span onclick="navigate('cart')"><i class="ph ph-shopping-cart"></i> Cart</span>
                        <span onclick="navigate('profile')"><i class="ph ph-user"></i> Profile</span>
                        <span onclick="navigate('project-team')"><i class="ph ph-graduation-cap"></i> Project Team</span>
                    </div>

                    <div class="header-right">
                        <div class="icon-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                            <i class="ph ph-moon" id="theme-icon"></i>
                        </div>
                        <div class="icon-btn" onclick="navigate('notifications')" title="Notifications">
                            <i class="ph ph-bell"></i>
                            <span id="notif-badge" class="mini-badge hidden">0</span>
                        </div>
                    </div>
                </div>

                <div class="search-bar-container" id="global-search-container">
                    <div class="search-bar">
                        <i class="ph ph-magnifying-glass" onclick="triggerSearch()"></i>
                        <input type="text" placeholder="Search for car/bike parts, brands, lubricants..." id="global-search-input" onkeyup="handleGlobalSearchKeyUp(event)">
                        <i class="ph ph-microphone" id="voice-search-btn" onclick="startVoiceSearch(event)" title="Search with Voice"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- ===== MAIN CONTENT AREA ===== -->
        <main id="main-content">
            <!-- Dynamic content injected by app.js -->
        </main>

        <!-- ===== BOTTOM NAVIGATION (Mobile only) ===== -->
        <nav id="bottom-nav">
            <div class="nav-item active" data-view="home" onclick="navigate('home')">
                <i class="ph ph-house"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" data-view="categories" onclick="navigate('categories')">
                <i class="ph ph-squares-four"></i>
                <span>Categories</span>
            </div>
            <div class="nav-item" data-view="wishlist" onclick="navigate('wishlist')">
                <div class="icon-wrapper">
                    <i class="ph ph-heart"></i>
                    <span id="wish-badge" class="badge hidden">0</span>
                </div>
                <span>Wishlist</span>
            </div>
            <div class="nav-item" data-view="cart" onclick="navigate('cart')">
                <div class="icon-wrapper">
                    <i class="ph ph-shopping-cart"></i>
                    <span id="cart-badge" class="badge hidden">0</span>
                </div>
                <span>Cart</span>
            </div>
            <div class="nav-item" data-view="profile" onclick="navigate('profile')">
                <i class="ph ph-user-circle"></i>
                <span>Profile</span>
            </div>
        </nav>
    </div>

    <!-- ===== TOAST NOTIFICATION CONTAINER ===== -->
    <div id="toast-container"></div>

    <!-- ===== LOADING OVERLAY ===== -->
    <div id="loading-overlay" class="hidden">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <p class="loader-text">Loading...</p>
        </div>
    </div>

    <!-- ===== IMAGE VIEWER MODAL ===== -->
    <div id="image-viewer" class="image-viewer-overlay hidden">
        <button class="iv-close" onclick="closeImageViewer()"><i class="ph ph-x"></i></button>
        <button class="iv-prev" onclick="prevImage()"><i class="ph ph-caret-left"></i></button>
        <img id="iv-image" src="" alt="Product Image">
        <button class="iv-next" onclick="nextImage()"><i class="ph ph-caret-right"></i></button>
        <div class="iv-counter" id="iv-counter">1 / 1</div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
